        .header { background: linear-gradient(135deg, #161638, #12122a); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(102,126,234,0.2); position: relative; z-index: 10; }

        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        
        #graphContainer { flex: 1; position: relative; }
        #network { width: 100%; height: calc(100vh - 56px); }
        
        .detail-panel { position: fixed; top: 56px; right: -400px; width: 380px; height: calc(100vh - 56px); background: rgba(18,18,42,0.97); border-left: 1px solid rgba(102,126,234,0.2); padding: 24px; overflow-y: auto; transition: right 0.3s; z-index: 100; }
        .detail-panel.open { right: 0; }
        .detail-panel h2 { font-size: 18px; color: #fff; margin-bottom: 16px; }
        .detail-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #888; font-size: 20px; cursor: pointer; }
        .detail-stat { background: rgba(102,126,234,0.1); border: 1px solid rgba(102,126,234,0.2); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        .detail-stat .label { font-size: 11px; color: #888; }
        .detail-stat .value { font-size: 20px; color: #fff; font-weight: 700; margin-top: 4px; }
        .detail-stat .yoy { font-size: 12px; margin-top: 4px; }
        .detail-table { width: 100%; font-size: 11px; margin-top: 16px; }
        .detail-table th { text-align: left; color: #888; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .detail-table td { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .tooltip { position: absolute; background: rgba(18,18,42,0.95); border: 1px solid rgba(102,126,234,0.3); border-radius: 8px; padding: 12px; font-size: 12px; pointer-events: none; z-index: 200; max-width: 280px; }
        
        .filter-panel { position: absolute; top: 8px; left: 8px; background: rgba(18,18,42,0.95); border: 1px solid rgba(102,126,234,0.2); border-radius: 8px; padding: 12px; font-size: 12px; z-index: 10; }
        .filter-panel h3 { font-size: 13px; color: #fff; margin-bottom: 8px; }
        .filter-panel label { color: #aaa; display: block; margin-top: 8px; }
        .filter-panel select { width: 100%; margin-top: 4px; background: rgba(255,255,255,0.1); border: 1px solid rgba(102,126,234,0.3); color: #e0e0e0; padding: 4px 8px; border-radius: 4px; font-size: 12px; }

    <div class="header">

        </div>
        <div class="controls">
            <div>
                <label>年份：</label>
                <select id="yearSelect">

                    <option value="2022">2022年</option>
                    <option value="2021">2021年</option>
                    <option value="2020">2020年</option>
                    <option value="2019">2019年</option>
                </select>
            </div>
            <div>

                    <option value="30" selected>TOP30</option>
                    <option value="50">TOP50</option>
                    <option value="100">TOP100</option>

            </div>
            <div class="legend">

            </div>
        </div>
    </div>
    
    <div id="graphContainer">
        <div id="network"></div>
        
        <div class="filter-panel">

            <label>大洲筛选：</label>

                <option value="非洲">非洲</option>
                <option value="大洋洲">大洋洲</option>
            </select>
            <label>最小贸易额（亿元）：</label>
            <input type="range" id="minTrade" min="0" max="5000" value="500" style="width:100%;">
            <div style="color:#667eea; font-size:13px; margin-top:4px;" id="minTradeLabel">500亿</div>
        </div>
        
        <div class="stats-bar" id="statsBar">
            节点数：<span id="nodeCount">0</span> &nbsp;|&nbsp; 连接数：<span id="edgeCount">0</span> &nbsp;|&nbsp; 覆盖贸易额：<span id="totalTrade">0</span>亿元
        </div>
    </div>
    
    <div class="detail-panel" id="detailPanel">
        <button class="detail-close" onclick="closeDetail()">×</button>

        <div id="detailContent"></div>

                }
            });

        function showDetail(name, year) {
            var yearData = DATA[year] || [];
            var d = yearData.find(function(x) { return x.country.trim() === name; });
            if (!d) return;
            
            document.getElementById('detailTitle').textContent = '📊 ' + name + ' (' + year + ')';
            
            var trade = d.import_export_rmb / 10000;
            var exportVal = d.export_rmb / 10000;
            var importVal = d.import_rmb / 10000;
            var balance = d.export_rmb - d.import_rmb;
            var balanceText = balance >= 0 ? '+' + (balance/10000).toFixed(0) + '亿元（顺差）' : (balance/10000).toFixed(0) + '亿元（逆差）';
            var balanceColor = balance >= 0 ? '#4ade80' : '#f87171';
            
            // 同比计算
            var prevYear = (parseInt(year) - 1).toString();
            var prevD = (DATA[prevYear] || []).find(function(x) { return x.country.trim() === name; });
            var yoyHtml = '';
            if (prevD) {
                var yoy = (d.import_export_rmb - prevD.import_export_rmb) / prevD.import_export_rmb * 100;
                var yoyColor = yoy >= 0 ? '#4ade80' : '#f87171';
                yoyHtml = '<div class="detail-stat"><div class="label">同比增幅（vs ' + prevYear + '）</div><div class="value" style="color:' + yoyColor + '">' + yoy.toFixed(2) + '%</div></div>';
            }
            
            // 5年趋势
            var trendHtml = '<div class="detail-table"><th>年份</th><th>进出口(亿元)</th><th>同比</th>';
            for (var y = 2019; y <= parseInt(year); y++) {
                var dy = DATA[y.toString()];
                if (!dy) continue;
                var xy = dy.find(function(x) { return x.country.trim() === name; });
                if (!xy) continue;
                var prevY = DATA[(y-1).toString()];
                var prevXY = prevY ? prevY.find(function(x) { return x.country.trim() === name; }) : null;
                var yoy2 = prevXY ? ((xy.import_export_rmb - prevXY.import_export_rmb) / prevXY.import_export_rmb * 100) : null;
                trendHtml += '<tr><td>' + y + '</td><td>' + (xy.import_export_rmb/10000).toFixed(0) + '</td><td style="color:' + (yoy2 >= 0 ? '#4ade80' : '#f87171') + '">' + (yoy2 !== null ? yoy2.toFixed(1) + '%' : '-') + '</td></tr>';
            }
            trendHtml += '</div>';
            
            document.getElementById('detailContent').innerHTML = 
                '<div class="detail-stat"><div class="label">进出口总额</div><div class="value">' + trade.toFixed(0) + '亿元</div></div>' +
                '<div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">' +
                    '<div class="detail-stat"><div class="label">出口</div><div class="value" style="font-size:16px;color:#4ade80;">' + exportVal.toFixed(0) + '亿</div></div>' +
                    '<div class="detail-stat"><div class="label">进口</div><div class="value" style="font-size:16px;color:#f87171;">' + importVal.toFixed(0) + '亿</div></div>' +
                '</div>' +
                '<div class="detail-stat"><div class="label">贸易差额</div><div class="value" style="color:' + balanceColor + ';font-size:16px;">' + balanceText + '</div></div>' +
                yoyHtml +
                trendHtml;
            
            document.getElementById('detailPanel').classList.add('open');
        }
        
        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('open');
        }
        
        // 事件监听
        document.getElementById('yearSelect').addEventListener('change', initGraph);
        document.getElementById('topSelect').addEventListener('change', initGraph);
        document.getElementById('continentFilter').addEventListener('change', initGraph);
        document.getElementById('minTrade').addEventListener('input', function() {
            document.getElementById('minTradeLabel').textContent = this.value + '亿';
            initGraph();
        });
        
        // 初始化
        initGraph();
    </script>
